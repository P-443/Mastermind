global
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    option  tcplog
    option  nolinger
    # تقليل الوقت جداً لقتل الاتصال القديم (ثانية واحدة للربط)
    timeout connect 1s
    timeout client  2s
    timeout server  2s

frontend proxy_in
    bind *:8080
    default_backend rotating_proxies

backend rotating_proxies
    # leastconn بيختار البروكسي اللي معليهوش أي اتصال حالياً
    balance leastconn
    option tcp-check
    # أهم سطر: ممنوع أي بروكسي يخدم أكتر من طلب واحد
    # وبمجرد ما يخلص، السيرفر بيقفل الاتصال فوراً
    default-server maxconn 1 check inter 1000
